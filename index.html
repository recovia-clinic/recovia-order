<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECOVIA 발주 입력</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --navy: #1B2E4B;
    --navy-light: #2a4068;
    --mint: #A8D5C2;
    --mint-light: #d4ede5;
    --blush: #F2D7D5;
    --bg: #f5f7fa;
    --white: #ffffff;
    --gray-100: #f0f2f5;
    --gray-200: #e2e6ec;
    --gray-400: #9aa3b0;
    --gray-600: #5a6472;
    --gray-800: #2d3440;
    --success: #34c77b;
    --warning: #f59e0b;
    --danger: #ef4444;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(27,46,75,0.08);
    --shadow-lg: 0 8px 32px rgba(27,46,75,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--gray-800);
    min-height: 100vh;
  }

  /* ── 헤더 ── */
  header {
    background: var(--navy);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.18);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-mark {
    width: 36px;
    height: 36px;
    background: var(--mint);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: -1px;
  }
  .logo-text {
    color: white;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 2px;
  }
  .logo-sub {
    color: var(--mint);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 1px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  #statusBadge {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 500;
  }
  .badge-ready { background: rgba(168,213,194,0.2); color: var(--mint); }
  .badge-saving { background: rgba(245,158,11,0.2); color: var(--warning); }
  .badge-done { background: rgba(52,199,123,0.2); color: var(--success); }
  .badge-error { background: rgba(239,68,68,0.2); color: var(--danger); }

  /* ── 설정 패널 ── */
  .config-bar {
    background: var(--navy-light);
    padding: 10px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 12px;
    color: var(--mint-light);
  }
  .config-bar input {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(168,213,194,0.3);
    color: white;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    width: 440px;
  }
  .config-bar input::placeholder { color: rgba(255,255,255,0.3); }
  .btn-sm {
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-mint { background: var(--mint); color: var(--navy); }
  .btn-mint:hover { background: #90c8b0; }

  /* ── 메인 레이아웃 ── */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 20px;
  }

  /* ── 카드 ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-400);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gray-200);
  }

  /* ── 폼 요소 ── */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .form-row.full { grid-template-columns: 1fr; }
  .form-row.three { grid-template-columns: 1fr 1fr 1fr; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-600);
    letter-spacing: 0.5px;
  }
  .field input, .field select, .field textarea {
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--gray-800);
    transition: border-color 0.2s, box-shadow 0.2s;
    background: var(--white);
    outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--mint);
    box-shadow: 0 0 0 3px rgba(168,213,194,0.2);
  }
  .field select { cursor: pointer; }

  /* ── 제품 라인 ── */
  #productLines { display: flex; flex-direction: column; gap: 12px; }

  .product-line {
    display: grid;
    grid-template-columns: 1fr 100px 100px 100px 36px;
    gap: 10px;
    align-items: center;
    padding: 14px 16px;
    background: var(--gray-100);
    border-radius: var(--radius-sm);
    border: 1.5px solid transparent;
    transition: border-color 0.2s;
  }
  .product-line:hover { border-color: var(--mint); }
  .product-line select, .product-line input {
    border: 1.5px solid var(--gray-200);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--white);
    outline: none;
    transition: border-color 0.2s;
  }
  .product-line select:focus, .product-line input:focus {
    border-color: var(--mint);
  }
  .product-line .price-display {
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--navy);
    font-weight: 500;
    text-align: right;
    padding: 8px 10px;
    background: var(--mint-light);
    border-radius: 6px;
  }
  .btn-remove {
    width: 32px;
    height: 32px;
    border: none;
    background: none;
    color: var(--gray-400);
    cursor: pointer;
    border-radius: 6px;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .btn-remove:hover { background: var(--blush); color: var(--danger); }

  .btn-add-line {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border: 2px dashed var(--gray-200);
    background: none;
    border-radius: var(--radius-sm);
    color: var(--gray-400);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    margin-top: 8px;
    font-weight: 500;
  }
  .btn-add-line:hover { border-color: var(--mint); color: var(--navy); background: var(--mint-light); }

  /* ── 합계 카드 ── */
  .summary-card {
    background: var(--navy);
    border-radius: var(--radius);
    padding: 24px 28px;
    margin-bottom: 20px;
    color: white;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  .summary-item label {
    font-size: 11px;
    color: var(--mint);
    letter-spacing: 1.5px;
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
  }
  .summary-item .value {
    font-size: 22px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: white;
  }
  .summary-item .value.highlight { color: var(--mint); }

  /* ── 버튼 ── */
  .btn-group {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
  }
  .btn {
    padding: 12px 28px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-primary {
    background: var(--mint);
    color: var(--navy);
    box-shadow: 0 4px 16px rgba(168,213,194,0.4);
  }
  .btn-primary:hover { background: #90c8b0; transform: translateY(-1px); }
  .btn-primary:disabled { background: var(--gray-200); color: var(--gray-400); transform: none; box-shadow: none; cursor: not-allowed; }
  .btn-outline {
    background: none;
    border: 1.5px solid var(--gray-200);
    color: var(--gray-600);
  }
  .btn-outline:hover { border-color: var(--navy); color: var(--navy); }

  /* ── 토스트 ── */
  #toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    padding: 14px 20px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    z-index: 1000;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 360px;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { background: var(--navy); color: var(--mint); }
  #toast.error { background: #fff0f0; color: var(--danger); border: 1px solid #fecaca; }

  /* ── 이력 테이블 ── */
  .history-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .history-table th {
    background: var(--gray-100);
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    color: var(--gray-600);
    font-size: 11px;
    letter-spacing: 0.5px;
  }
  .history-table td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--gray-100);
    color: var(--gray-800);
  }
  .history-table tr:last-child td { border-bottom: none; }
  .history-table tr:hover td { background: var(--gray-100); }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
  }
  .tag-blue { background: #dbeafe; color: #1d4ed8; }
  .tag-green { background: #d1fae5; color: #065f46; }
  .tag-orange { background: #fed7aa; color: #92400e; }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--gray-400);
    font-size: 13px;
  }

  /* ── 반응형 ── */
  @media (max-width: 640px) {
    header { padding: 12px 16px; }
    .config-bar { flex-direction: column; align-items: flex-start; gap: 8px; }
    .config-bar input { width: 100%; }
    .main { padding: 16px 12px; }
    .form-row { grid-template-columns: 1fr; }
    .form-row.three { grid-template-columns: 1fr; }
    .product-line { grid-template-columns: 1fr 70px; }
    .product-line .price-display, .product-line input[placeholder="수량"] { display: none; }
    .summary-grid { grid-template-columns: 1fr; }
  }

  /* ── 로그인 화면 ── */
  #loginScreen {
    position: fixed;
    inset: 0;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    flex-direction: column;
    gap: 24px;
  }
  #loginScreen .login-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(168,213,194,0.2);
    border-radius: 16px;
    padding: 40px;
    width: 320px;
    text-align: center;
  }
  #loginScreen .login-logo {
    width: 52px;
    height: 52px;
    background: var(--mint);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 700;
    color: var(--navy);
    margin: 0 auto 20px;
  }
  #loginScreen h2 {
    color: white;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  #loginScreen p {
    color: var(--gray-400);
    font-size: 13px;
    margin-bottom: 24px;
  }
  #loginScreen input {
    width: 100%;
    text-align: center;
    letter-spacing: 8px;
    font-size: 24px;
    font-family: 'DM Mono', monospace;
    border: 2px solid rgba(168,213,194,0.3);
    background: rgba(255,255,255,0.05);
    color: white;
    border-radius: 10px;
    padding: 14px;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  #loginScreen input:focus { border-color: var(--mint); }
  #loginScreen .login-btn {
    width: 100%;
    padding: 14px;
    background: var(--mint);
    color: var(--navy);
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  #loginScreen .login-btn:hover { background: #90c8b0; }
  #loginScreen .login-error {
    color: #fca5a5;
    font-size: 12px;
    margin-top: 10px;
    min-height: 18px;
  }
  #mainContent { display: none; }
</style>
</head>
<body>

<!-- 헤더 -->

<!-- 로그인 화면 -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">R</div>
    <h2>RECOVIA 발주 시스템</h2>
    <p>본원 전용 — PIN을 입력하세요</p>
    <input type="password" id="pinInput" maxlength="6" placeholder="••••"
           oninput="onPinInput(this)" onkeydown="if(event.key==='Enter')checkPin()">
    <button class="login-btn" onclick="checkPin()">로그인</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- 메인 콘텐츠 -->
<div id="mainContent">
<header>
  <div class="logo">
    <div class="logo-mark">R</div>
    <div>
      <div class="logo-text">RECOVIA</div>
      <div class="logo-sub">본원 발주 입력 시스템</div>
    </div>
  </div>
  <div class="header-right">
    <span id="statusBadge" class="badge-ready">● 준비</span>
  </div>
</header>

<!-- GAS URL 설정 -->
<div class="config-bar" style="display:none;">
  <span>⚙ GAS URL</span>
  <input type="text" id="gasUrlInput" placeholder="https://script.google.com/macros/s/.../exec  (발주재고 GAS URL)">
  <button class="btn-sm btn-mint" onclick="saveGasUrl()">저장</button>
  <span id="gasUrlStatus" style="color:rgba(255,255,255,0.5)"></span>
</div>

<!-- 메인 -->
<div class="main">

  <!-- ① 클리닉 정보 -->
  <div class="card">
    <div class="card-title">① 클리닉 정보</div>

    <!-- 클리닉 코드 → 자동완성 트리거 -->
    <div class="form-row">
      <div class="field">
        <label>클리닉 코드 <span style="font-size:11px;color:var(--mint);font-weight:400;">입력하면 나머지 자동 입력</span></label>
        <div style="position:relative;">
          <input type="text" id="clinicCode" placeholder="CLINIC001 입력 후 Enter"
                 style="font-family:'DM Mono',monospace;"
                 oninput="onCodeInput(this)" onkeydown="if(event.key==='Enter')lookupClinic()">
          <button onclick="lookupClinic()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);
            background:var(--mint);color:var(--navy);border:none;padding:4px 10px;border-radius:5px;
            font-size:11px;font-weight:600;cursor:pointer;">조회</button>
        </div>
        <div id="lookupMsg" style="font-size:11px;color:var(--gray-400);margin-top:4px;"></div>
      </div>
      <div class="field">
        <label>클리닉명 * <span style="font-size:11px;color:var(--gray-400);font-weight:400;">코드 없어도 직접 입력 가능</span></label>
        <input type="text" id="clinicName" placeholder="○○ 피부과의원 (입력하면 자동완성)"
               list="clinicList" oninput="onClinicNameInput(this)" onchange="onClinicNameInput(this)">
        <datalist id="clinicList"></datalist>
        <div id="clinicLoadStatus" style="font-size:11px;color:var(--gray-400);margin-top:4px;"></div>
      </div>
    </div>

    <div class="form-row three">
      <div class="field">
        <label>원장명</label>
        <input type="text" id="doctorName" placeholder="홍길동 원장">
      </div>
      <div class="field">
        <label>클리닉 전화번호</label>
        <input type="text" id="clinicPhone" placeholder="02-0000-0000">
      </div>
      <div class="field">
        <label>발주 요청일 *</label>
        <input type="date" id="orderDate">
      </div>
    </div>

    <!-- 담당자 정보 -->
    <div class="form-row">
      <div class="field">
        <label>담당자 이름 <span style="font-size:11px;color:var(--gray-400);font-weight:400;">스탭·원무과 등</span></label>
        <input type="text" id="managerName" placeholder="김○○ 실장">
      </div>
      <div class="field">
        <label>담당자 연락처</label>
        <input type="text" id="managerPhone" placeholder="010-0000-0000">
      </div>
    </div>
    <div class="form-row three">
      <div class="field">
        <label>적용 할인율</label>
        <select id="discountRate" onchange="calcAll()">
          <option value="0">없음 (0%)</option>
          <option value="5">5%</option>
          <option value="10">10%</option>
          <option value="15">15%</option>
          <option value="20">20%</option>
          <option value="25">25%</option>
          <option value="30">30%</option>
        </select>
      </div>
      <div class="field">
        <label>결제 조건</label>
        <select id="paymentTerm">
          <option value="선결제">선결제</option>
          <option value="15일 이내">세금계산서 15일 이내</option>
          <option value="30일 이내">세금계산서 30일 이내</option>
          <option value="월말 정산">월말 정산</option>
        </select>
      </div>
      <div class="field">
        <label>배송 요청사항</label>
        <select id="deliveryPreset" onchange="applyDeliveryPreset(this)"
          style="border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--gray-800);background:var(--white);outline:none;margin-bottom:6px;width:100%;cursor:pointer;">
          <option value="">-- 기본 문구 선택 --</option>
          <option value="특이사항 없음">특이사항 없음</option>
          <option value="냉장 보관 요망">냉장 보관 요망</option>
          <option value="파손 주의 (앰플 포함)">파손 주의 (앰플 포함)</option>
          <option value="오전 배송 요청">오전 배송 요청</option>
          <option value="부재 시 경비실 맡겨주세요">부재 시 경비실 맡겨주세요</option>
          <option value="직접 입력">직접 입력...</option>
        </select>
        <input type="text" id="deliveryNote" placeholder="직접 입력 또는 위에서 선택"
               style="display:none;" oninput="onDeliveryInput(this)">
        <div id="deliveryPreview" style="font-size:12px;color:var(--navy);background:var(--mint-light);
             padding:6px 10px;border-radius:6px;margin-top:4px;display:none;"></div>
      </div>
    </div>
  </div>

  <!-- ② 제품 선택 -->
  <div class="card">
    <div class="card-title">② 제품 선택</div>
    <div style="display:grid;grid-template-columns:1fr 100px 100px 100px 36px;gap:10px;padding:0 16px;margin-bottom:8px;">
      <span style="font-size:11px;color:var(--gray-400);font-weight:600;">제품명</span>
      <span style="font-size:11px;color:var(--gray-400);font-weight:600;text-align:center;">수량</span>
      <span style="font-size:11px;color:var(--gray-400);font-weight:600;text-align:center;">단가(원)</span>
      <span style="font-size:11px;color:var(--gray-400);font-weight:600;text-align:right;">소계</span>
      <span></span>
    </div>
    <div id="productLines"></div>
    <button class="btn-add-line" onclick="addProductLine()">+ 제품 추가</button>
  </div>

  <!-- ③ 합계 -->
  <div class="summary-card">
    <div class="summary-grid">
      <div class="summary-item">
        <label>총 수량</label>
        <div class="value" id="totalQty">0 개</div>
      </div>
      <div class="summary-item">
        <label>할인 전 금액</label>
        <div class="value" id="totalBeforeDiscount">0 원</div>
      </div>
      <div class="summary-item">
        <label>최종 공급가</label>
        <div class="value highlight" id="totalFinal">0 원</div>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn btn-outline" style="color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.2);" onclick="resetForm()">초기화</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveOrder()">📤 저장 (Sheets + 노션)</button>
    </div>
  </div>

  <!-- 최근 발주 이력 -->
  <div class="card">
    <div class="card-title">최근 발주 이력 (이번 세션)</div>
    <div id="historyArea">
      <div class="empty-state">저장된 발주가 없습니다.</div>
    </div>
  </div>

</div>

<!-- 토스트 -->
<div id="toast"></div>

<script>
// ───────────────────────────────────────────────
// 설정
// ───────────────────────────────────────────────
// ───────────────────────────────────────────────
// 클리닉 목록 (클리닉 추가 시 여기에 추가)
// ───────────────────────────────────────────────
const CLINIC_LIST = [
  {
    클리닉코드: 'RECOVIA001',
    클리닉명: '레코바 피부과의원 (본원)',
    원장명: '',
    전화번호: '',
    담당자: '',
    담당자연락처: '',
    적용중할인율: '0',
  },
  /* ★ 새 클리닉 추가 방법 ★
     아래 형식을 복사해서 이 위에 붙여넣기 후 저장
  {
    클리닉코드: 'CLINIC002',
    클리닉명: '○○ 피부과의원',
    원장명: '홍길동',
    전화번호: '02-0000-0000',
    담당자: '김○○',
    담당자연락처: '010-0000-0000',
    적용중할인율: '10',
  },
  */
];

const PRODUCTS = [
  { name: 'Core Kit (앰플+크림+선크림)',         price: 7800 },
  { name: 'Laser Kit (Core+쿨링젤+미백앰플)',    price: 11000 },
  { name: 'RF/HIFU Kit (Core+딥수분+펩타이드)', price: 11500 },
  { name: 'Filler Kit (Core+항멍젤)',            price: 9600 },
  { name: 'Booster Kit (Core+재생부스터)',       price: 11000 },
  { name: 'Sensitive Kit (울트라캄+크림+선크림)',price: 8000 },
  { name: 'Soothing Ampoule (7ml)',              price: 2200 },
  { name: 'Recovery Barrier Cream (8g)',         price: 2400 },
  { name: 'Mineral Shield SPF50+ (8g)',          price: 2000 },
  { name: 'Cooling Gel (8g)',                    price: 1800 },
  { name: 'Anti-Bruise Arnica Gel (8g)',         price: 2100 },
  { name: 'Regeneration Booster (10ml)',         price: 3500 },
  { name: '기타 (직접 입력)',                    price: 0 },
];

// 세션 이력
let sessionHistory = [];
let lineCount = 0;

// ───────────────────────────────────────────────
// 초기화
// ───────────────────────────────────────────────
// ───────────────────────────────────────────────
// PIN 로그인
// ───────────────────────────────────────────────
// ★ PIN 변경 시 아래 값만 수정하세요
const ORDER_PIN = '1234'; // 발주 시스템 PIN (4~6자리)

function onPinInput(input) {
  document.getElementById('loginError').textContent = '';
  // 숫자만 허용
  input.value = input.value.replace(/[^0-9]/g, '');
  if (input.value.length >= 4) checkPin();
}

function checkPin() {
  const input = document.getElementById('pinInput');
  const entered = input.value.trim();
  if (entered === ORDER_PIN) {
    // 로그인 성공 — localStorage에 세션 저장 (24시간)
    localStorage.setItem('recovia_order_login', Date.now() + 86400000);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    initApp();
  } else {
    const err = document.getElementById('loginError');
    err.textContent = '❌ PIN이 올바르지 않습니다.';
    input.value = '';
    input.focus();
    // 3회 실패 시 메시지 강화 (간단 구현)
  }
}

function checkLoginSession() {
  const saved = localStorage.getItem('recovia_order_login');
  if (saved && Date.now() < parseInt(saved)) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    return true;
  }
  document.getElementById('pinInput').focus();
  return false;
}

window.onload = () => {
  if (!checkLoginSession()) {
    setTimeout(() => document.getElementById('pinInput').focus(), 100);
  }
};

function initApp() {
  document.getElementById('orderDate').value = todayKST();
  loadGasUrl();
  addProductLine();
  loadAllClinics(); // CLINIC_LIST 기반 초기화
};

function todayKST() {
  const kst = new Date(Date.now() + 9 * 60 * 60 * 1000);
  return kst.toISOString().slice(0, 10);
}

function orderNoKST() {
  const kst = new Date(Date.now() + 9 * 60 * 60 * 1000);
  const ymd = kst.toISOString().slice(2,10).replace(/-/g,'');
  const rand = String(Math.floor(Math.random()*900)+100);
  return `ORD-${ymd}-${rand}`;
}

// ───────────────────────────────────────────────
// 클리닉 코드 → 노션 거래처 DB 자동완성
// ───────────────────────────────────────────────
let clinicCache = {}; // { 코드: { 클리닉명, 원장명, 전화번호, 담당자, 담당자연락처, 할인율 } }
// 전체 클리닉 목록: [{ 클리닉명, 클리닉코드, 원장명, 전화번호, 담당자, 담당자연락처, 적용중할인율 }]
let allClinics = [];

// ── 클리닉 목록 초기화 (CLINIC_LIST 하드코딩 기반, GAS URL 없이 바로 동작) ──
function loadAllClinics() {
  allClinics = CLINIC_LIST;
  // 코드 기반 캐시 구축
  allClinics.forEach(c => {
    if (c.클리닉코드) clinicCache[c.클리닉코드.toUpperCase()] = c;
  });
  // 클리닉명 datalist 업데이트
  const dl = document.getElementById('clinicList');
  if (dl) {
    dl.innerHTML = allClinics.map(c =>
      `<option value="${c.클리닉명}">${c.클리닉명}${c.클리닉코드 ? ' (' + c.클리닉코드 + ')' : ''}</option>`
    ).join('');
  }
  const statusEl = document.getElementById('clinicLoadStatus');
  if (statusEl) {
    statusEl.textContent = `✓ ${allClinics.length}개 클리닉 등록됨`;
    statusEl.style.color = 'var(--success)';
    setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 2000);
  }
}

// 클리닉명 선택 시 코드·나머지 정보 자동 입력
function onClinicNameInput(input) {
  const val = input.value.trim();
  // datalist에서 정확히 일치하는 항목 찾기
  const found = allClinics.find(c =>
    c.클리닉명 === val || c.클리닉명.includes(val) || val.includes(c.클리닉명)
  );
  if (found) {
    // 코드 자동 입력
    if (found.클리닉코드) document.getElementById('clinicCode').value = found.클리닉코드;
    fillClinicFields(found);
    document.getElementById('lookupMsg').textContent = '✓ 자동 입력됨';
    document.getElementById('lookupMsg').style.color = 'var(--success)';
  }
}

function onCodeInput(input) {
  // 입력 중 코드 소문자→대문자 자동 변환
  input.value = input.value.toUpperCase();
}

function lookupClinic() {
  const code = document.getElementById('clinicCode').value.trim().toUpperCase();
  if (!code) return;
  const msg = document.getElementById('lookupMsg');

  // 캐시 또는 CLINIC_LIST에서 코드 매칭
  const found = clinicCache[code] || allClinics.find(c => (c.클리닉코드||'').toUpperCase() === code);
  if (found) {
    clinicCache[code] = found;
    fillClinicFields(found);
    msg.textContent = '✓ 자동 입력됨';
    msg.style.color = 'var(--success)';
  } else {
    msg.textContent = '등록된 코드가 없습니다. 직접 입력해주세요.';
    msg.style.color = 'var(--warning)';
  }
}

function fillClinicFields(info) {
  if (info.클리닉명)     document.getElementById('clinicName').value   = info.클리닉명;
  if (info.원장명)       document.getElementById('doctorName').value   = info.원장명;
  if (info.전화번호)     document.getElementById('clinicPhone').value  = info.전화번호;
  if (info.담당자)       document.getElementById('managerName').value  = info.담당자;
  if (info.담당자연락처) document.getElementById('managerPhone').value = info.담당자연락처;
  // 할인율 자동 적용
  if (info.적용중할인율) {
    const pct = parseInt(info.적용중할인율);
    if (!isNaN(pct)) {
      document.getElementById('discountRate').value = String(pct);
      calcAll();
    }
  }
}


function saveGasUrl() {
  const url = document.getElementById('gasUrlInput').value.trim();
  if (!url) return;
  localStorage.setItem('recovia_order_gas_url', url);
  document.getElementById('gasUrlStatus').textContent = '✓ 저장됨';
  setTimeout(() => document.getElementById('gasUrlStatus').textContent = '', 2000);
}

function loadGasUrl() {
  const saved = localStorage.getItem('recovia_order_gas_url');
  if (saved) {
    document.getElementById('gasUrlInput').value = saved;
    document.getElementById('gasUrlStatus').textContent = '✓ 불러옴';
    setTimeout(() => document.getElementById('gasUrlStatus').textContent = '', 2000);
  }
}

function getGasUrl() {
  // ★ 발주재고 GAS URL 하드코딩 (변경 시 이 값만 수정)
  const HARDCODED_GAS_URL = 'https://script.google.com/macros/s/AKfycbwG9CGg00hvYuy9UZFRULssF1kThI0nuz4-3t-P39cvZUH5KM_7pwB8p8n2STGExPjl3g/exec';
  return HARDCODED_GAS_URL
      || document.getElementById('gasUrlInput').value.trim()
      || localStorage.getItem('recovia_order_gas_url') || '';
}

// ───────────────────────────────────────────────
// 제품 라인
// ───────────────────────────────────────────────
function addProductLine() {
  lineCount++;
  const id = `line_${lineCount}`;
  const div = document.createElement('div');
  div.className = 'product-line';
  div.id = id;

  const options = PRODUCTS.map((p,i) =>
    `<option value="${i}" data-price="${p.price}">${p.name}</option>`
  ).join('');

  div.innerHTML = `
    <select onchange="onProductChange(this,'${id}')">
      <option value="">-- 제품 선택 --</option>
      ${options}
    </select>
    <input type="number" placeholder="수량" min="1" value="1"
           style="text-align:center;" oninput="calcAll()">
    <input type="number" placeholder="단가" min="0" value=""
           id="price_${id}"
           style="text-align:right;font-family:'DM Mono',monospace;cursor:text;"
           oninput="calcAll()" onclick="this.select()">
    <div class="price-display" id="sub_${id}">—</div>
    <button class="btn-remove" onclick="removeLine('${id}')" title="삭제">×</button>
  `;
  document.getElementById('productLines').appendChild(div);
}

function onProductChange(sel, id) {
  const idx = parseInt(sel.value);
  if (isNaN(idx)) return;
  const p = PRODUCTS[idx];
  const priceInput = document.getElementById('price_' + id);
  if (!priceInput) return;
  if (p.price > 0) {
    priceInput.value = p.price;
  } else {
    priceInput.value = '';
    priceInput.placeholder = '단가 직접 입력';
    setTimeout(() => { priceInput.focus(); priceInput.click(); }, 50);
  }
  calcAll();
}

function removeLine(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
  calcAll();
}

// ───────────────────────────────────────────────
// 계산
// ───────────────────────────────────────────────
function calcAll() {
  const discount = parseInt(document.getElementById('discountRate').value) || 0;
  let totalQty = 0, totalBefore = 0;

  document.querySelectorAll('.product-line').forEach(line => {
    const inputs = line.querySelectorAll('input');
    const qty = parseInt(inputs[0]?.value) || 0;
    const unitPrice = parseInt(inputs[1]?.value) || 0;
    const sub = qty * unitPrice;
    totalQty += qty;
    totalBefore += sub;

    const subEl = line.querySelector('[id^="sub_"]');
    if (subEl) subEl.textContent = sub > 0 ? fmtNum(sub) + '원' : '—';
  });

  const totalFinal = Math.round(totalBefore * (1 - discount / 100));
  document.getElementById('totalQty').textContent = totalQty + ' 개';
  document.getElementById('totalBeforeDiscount').textContent = fmtNum(totalBefore) + ' 원';
  document.getElementById('totalFinal').textContent = fmtNum(totalFinal) + ' 원';
}

function fmtNum(n) {
  return n.toLocaleString('ko-KR');
}

// ───────────────────────────────────────────────
// 저장
// ───────────────────────────────────────────────
async function saveOrder() {
  const clinicName = document.getElementById('clinicName').value.trim();
  const orderDate  = document.getElementById('orderDate').value;

  if (!clinicName) { showToast('클리닉명을 입력해주세요.', 'error'); return; }
  if (!orderDate)  { showToast('발주 요청일을 선택해주세요.', 'error'); return; }

  // 제품 목록 수집
  const items = [];
  let hasProduct = false;
  document.querySelectorAll('.product-line').forEach(line => {
    const sel = line.querySelector('select');
    const inputs = line.querySelectorAll('input');
    const idx = parseInt(sel?.value);
    const qty = parseInt(inputs[0]?.value) || 0;
    const unitPrice = parseInt(inputs[1]?.value) || 0;
    if (!isNaN(idx) && qty > 0 && unitPrice > 0) {
      const name = idx >= 0 && PRODUCTS[idx] ? PRODUCTS[idx].name : '기타';
      hasProduct = true;
      items.push({ name, qty, unitPrice, sub: qty * unitPrice });
    }
  });

  if (!hasProduct) { showToast('제품을 1개 이상 선택해주세요.', 'error'); return; }

  const discount = parseInt(document.getElementById('discountRate').value) || 0;
  const totalBefore = items.reduce((s, i) => s + i.sub, 0);
  const totalFinal = Math.round(totalBefore * (1 - discount / 100));
  const totalQty = items.reduce((s, i) => s + i.qty, 0);
  const orderNo = orderNoKST();

  const payload = {
    action: 'addOrder',
    발주번호: orderNo,
    클리닉코드: document.getElementById('clinicCode').value.trim(),
    클리닉명: clinicName,
    원장명: document.getElementById('doctorName').value.trim(),
    연락처: document.getElementById('clinicPhone').value.trim(),
    담당자: document.getElementById('managerName').value.trim(),
    담당자연락처: document.getElementById('managerPhone').value.trim(),
    발주일: orderDate,
    제품목록: items.map(i => `${i.name} ×${i.qty}`).join(' / '),
    총수량: totalQty,
    할인전금액: totalBefore,
    적용할인율: discount,
    공급총액: totalFinal,
    결제조건: document.getElementById('paymentTerm').value,
    배송요청사항: getDeliveryNote(),
    items: items,
  };

  // 상태 업데이트
  setStatus('saving');
  document.getElementById('saveBtn').disabled = true;

  const gasUrl = getGasUrl();
  let gasOk = false, gasMsg = '';
  let notionOk = false;

  // ① Sheets(GAS) 저장 — items 배열을 행별로 분리 전송
  if (gasUrl) {
    try {
      // 제품이 여러 개면 각 행별로 전송
      const rowsToSend = items.map((item, idx) => ({
        action: 'addOrder',
        클리닉코드: payload.클리닉코드,
        클리닉명: payload.클리닉명,
        제품코드: '',
        제품명: item.name,
        수량: item.qty,
        단가: item.unitPrice,
        적용할인율: payload.적용할인율,
        공급가: item.sub - Math.round(item.sub * payload.적용할인율 / 100),
        비고: idx === 0
          ? `결제조건: ${payload.결제조건} | 배송: ${payload.배송요청사항}`
          : '',
      }));

      let allOk = true;
      for (const row of rowsToSend) {
        const res = await fetch(gasUrl, {
          method: 'POST',
          body: JSON.stringify(row),
        });
        const json = await res.json();
        if (!json.ok) { allOk = false; gasMsg = json.error || '저장 실패'; }
      }
      gasOk = allOk;
    } catch (e) {
      gasMsg = e.message;
    }
  } else {
    gasMsg = 'GAS URL 미설정';
  }

  // ② 노션 주문 DB 저장 (Anthropic API 경유)
  try {
    const notionBody = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      mcp_servers: [{ type: 'url', url: 'https://mcp.notion.com/mcp', name: 'notion-mcp' }],
      messages: [{
        role: 'user',
        content: `노션 주문 DB(https://www.notion.so/b7e1086869eb473392cfdd1b3f6001be)에 아래 발주 내역을 새 페이지로 추가해주세요. JSON 응답 없이 바로 실행해주세요.

페이지 제목(주문명): ${payload.발주번호} — ${payload.클리닉명}
발주번호: ${payload.발주번호}
발주상태: 발주접수
발주일: ${payload.발주일}
발주담당자: ${payload.담당자 || '본원'}
담당자: ${payload.담당자 || ''}
주문일자: ${payload.발주일}
주문수량: ${payload.총수량}
공급단가: ${payload.총수량 > 0 ? Math.round(payload.공급총액 / payload.총수량) : 0}
공급총액: ${payload.공급총액}
적용할인율: ${payload.적용할인율}%
결제방식: ${payload.결제조건 === '선결제' ? '계좌이체' : '세금계산서'}
결제여부: 미결제
배송상태: 배송준비중
배송요청사항: ${payload.배송요청사항 || '없음'}
비고: ${payload.제품목록}`
      }]
    };

    const notionRes = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(notionBody),
    });
    const notionData = await notionRes.json();
    notionOk = !notionData.error;
  } catch(e) {
    // 노션 저장 실패해도 계속 진행
  }

  // 이력에 추가 (로컬)
  sessionHistory.unshift({
    no: orderNo,
    date: orderDate,
    clinic: clinicName,
    products: payload.제품목록,
    qty: totalQty,
    total: totalFinal,
    discount: discount,
    status: (gasOk && notionOk) ? '저장완료' : gasOk ? 'Sheets완료' : notionOk ? '노션완료' : (gasUrl ? '저장실패' : 'URL미설정'),
  });
  renderHistory();

  setStatus('done');
  document.getElementById('saveBtn').disabled = false;

  if (gasOk && notionOk) {
    showToast(`✅ Sheets + 노션 저장 완료! 발주번호: ${orderNo}`, 'success');
    resetAfterSave();
  } else if (gasOk) {
    showToast(`✅ Sheets 저장 완료 (노션 저장 실패). 발주번호: ${orderNo}`, 'success');
    resetAfterSave();
  } else if (notionOk) {
    showToast(`⚠️ 노션만 저장됨 (Sheets 실패: ${gasMsg}). 발주번호: ${orderNo}`, 'error');
  } else if (!gasUrl) {
    showToast(`⚠️ GAS URL 미설정. 노션 저장만 시도됨. 발주번호: ${orderNo}`, 'error');
  } else {
    showToast(`⚠️ 저장 실패 — Sheets: ${gasMsg}`, 'error');
  }

  setTimeout(() => setStatus('ready'), 3000);
}

// ── 배송 요청사항 선택/입력 처리 ──
function applyDeliveryPreset(sel) {
  const val = sel.value;
  const noteInput = document.getElementById('deliveryNote');
  const preview = document.getElementById('deliveryPreview');
  if (!val) {
    noteInput.style.display = 'none';
    preview.style.display = 'none';
    noteInput.value = '';
    return;
  }
  if (val === '직접 입력') {
    noteInput.style.display = 'block';
    noteInput.value = '';
    preview.style.display = 'none';
    noteInput.focus();
  } else {
    noteInput.style.display = 'none';
    noteInput.value = val;
    preview.textContent = '📦 ' + val;
    preview.style.display = 'block';
  }
}

function onDeliveryInput(input) {
  const preview = document.getElementById('deliveryPreview');
  if (input.value.trim()) {
    preview.textContent = '📦 ' + input.value.trim();
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
}

function getDeliveryNote() {
  const preset = document.getElementById('deliveryPreset').value;
  const note = document.getElementById('deliveryNote').value.trim();
  if (preset === '직접 입력') return note;
  return preset || note || '';
}

function resetAfterSave() {
  // 클리닉명·코드만 유지, 제품 초기화
  document.getElementById('productLines').innerHTML = '';
  lineCount = 0;
  addProductLine();
  document.getElementById('deliveryNote').value = '';
  document.getElementById('deliveryPreset').value = '';
  document.getElementById('deliveryPreview').style.display = 'none';
  document.getElementById('deliveryNote').style.display = 'none';
  calcAll();
}

function resetForm() {
  document.getElementById('clinicCode').value = '';
  document.getElementById('clinicName').value = '';
  document.getElementById('doctorName').value = '';
  document.getElementById('clinicPhone').value = '';
  document.getElementById('managerName').value = '';
  document.getElementById('managerPhone').value = '';
  document.getElementById('orderDate').value = todayKST();
  document.getElementById('discountRate').value = '0';
  document.getElementById('paymentTerm').value = '선결제';
  document.getElementById('deliveryNote').value = '';
  document.getElementById('lookupMsg').textContent = '';
  document.getElementById('productLines').innerHTML = '';
  lineCount = 0;
  addProductLine();
  calcAll();
}

// ───────────────────────────────────────────────
// 이력 렌더링
// ───────────────────────────────────────────────
function renderHistory() {
  const area = document.getElementById('historyArea');
  if (sessionHistory.length === 0) {
    area.innerHTML = '<div class="empty-state">저장된 발주가 없습니다.</div>';
    return;
  }
  area.innerHTML = `
    <table class="history-table">
      <thead>
        <tr>
          <th>발주번호</th>
          <th>날짜</th>
          <th>클리닉</th>
          <th>제품</th>
          <th>수량</th>
          <th>공급총액</th>
          <th>상태</th>
        </tr>
      </thead>
      <tbody>
        ${sessionHistory.map(h => `
          <tr>
            <td><span class="tag tag-blue" style="font-size:10px;">${h.no}</span></td>
            <td>${h.date}</td>
            <td>${h.clinic}</td>
            <td style="font-size:12px;color:var(--gray-600);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${h.products}</td>
            <td style="text-align:center;">${h.qty}개</td>
            <td style="font-family:'DM Mono',monospace;font-weight:500;">${fmtNum(h.total)}원<br><span style="font-size:10px;color:var(--gray-400);">할인 ${h.discount}%</span></td>
            <td><span class="tag ${h.status==='저장완료'?'tag-green':h.status==='URL미설정'?'tag-orange':'tag-orange'}">${h.status}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// ───────────────────────────────────────────────
// UI 유틸
// ───────────────────────────────────────────────
function setStatus(state) {
  const el = document.getElementById('statusBadge');
  const map = {
    ready:  ['● 준비', 'badge-ready'],
    saving: ['● 저장 중...', 'badge-saving'],
    done:   ['● 완료', 'badge-done'],
    error:  ['● 오류', 'badge-error'],
  };
  el.textContent = map[state][0];
  el.className = map[state][1];
}

function showToast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.className = type; }, 4000);
}
</script>
